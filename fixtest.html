<!DOCTYPE html>
<html lang="en">

<head>
    <title>Autocomplete Test - Fix</title>
    <style>
        input {
            display: block;
            margin-bottom: 1em;
        }
    </style>
</head>

<body>
    <form method="POST" action="#">
        <label for="cc-name">Name on card</label>
        <input id="cc-name" name="cc-name" autocomplete="cc-name" dir="ltr" value="">

        <label for="cc-number">Card information</label>
        <input id="cc-number" name="cc-number" autocomplete="cc-number" aria-label="Credit or debit card number" placeholder="1234 1234 1234 1234" required type="text" value="">
        <input id="cc-exp" name="cc-exp" autocomplete="cc-exp" aria-label="Credit or debit card expiration date" placeholder="MM / YY" required maxlength="7" type="text" value="">
        <input id="cc-csc" name="cc-csc" inputmode="numeric" autocomplete="cc-csc" aria-label="Credit or debit card CVC/CVV/CID" placeholder="CVC" required type="text" value="">
    </form>
</body>

</html>
