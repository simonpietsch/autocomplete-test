<!DOCTYPE html>
<html lang="en">

<head>
    <title>Autocomplete Test - Fix</title>
    <style>
        input {
            display: block;
            margin-bottom: 1em;
        }
    </style>
</head>

<body>
    <form action="#">
        <label for="cardnumber">Card information</label>
        <input id="cardnumber" name="cardnumber" autocomplete="cc-number" aria-label="Credit or debit card number" placeholder="1234 1234 1234 1234" required type="text" value="">
        <input id="expiry" name="expiry" autocomplete="cc-exp" aria-label="Credit or debit card expiration date" placeholder="MM / YY" required maxlength="7" type="text" value="">
        <input id="cvc" name="cvc" inputmode="numeric" autocomplete="cc-csc" aria-label="Credit or debit card CVC/CVV/CID" placeholder="CVC" required type="text" value="">

        <label for="name">Name on card</label>
        <input id="name" name="name" autocomplete="cc-name" dir="ltr" value="">
    </form>
</body>

</html>
